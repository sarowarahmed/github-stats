
<svg width="800" height="220" xmlns="http://www.w3.org/2000/svg">

<defs>
  <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#7df9ff" stop-opacity="0.15"/>
    <stop offset="100%" stop-color="#ff6ec7" stop-opacity="0.15"/>
  </linearGradient>
</defs>

<style>
.title { fill: #c084fc; font-size: 16px; font-weight: 600; }
.label { fill: #9ca3af; font-size: 11px; text-anchor: middle; }
.value { fill: #ffffff; font-size: 18px; font-weight: 600; text-anchor: middle; }
.card { fill: #0d1117; stroke: #1f2937; stroke-width: 1; }
.glass { fill: url(#cardGrad); stroke: #7df9ff; stroke-opacity: 0.2; }
.spark { fill: none; stroke: #7df9ff; stroke-width: 1.5; opacity: 0.7; }
.spark-alt { fill: none; stroke: #ff6ec7; stroke-width: 1.5; opacity: 0.6; }
</style>

<rect x="5" y="5" width="790" height="210" rx="12" class="card"/>

<text class="title" x="24" y="40">🧠 Dev Insights</text>
<circle cx="760" cy="35" r="3" fill="#ff6ec7"/>
<line x1="20" y1="50" x2="780" y2="50" stroke="#1f2937"/>

<!-- ===== ROW 1 ===== -->
<!-- AVG -->
<g transform="translate(40,70)">
  <rect width="200" height="80" rx="10" class="glass"/>
  <text class="label" x="100" y="20">Avg</text>
  <text class="value" x="100" y="45">4.83</text>
  <polyline class="spark" points="0.0,0.0 12.307692307692308,0.0 24.615384615384617,22.5 36.92307692307693,22.5 49.23076923076923,7.5 61.53846153846154,15.0 73.84615384615385,22.5 86.15384615384616,22.5 98.46153846153847,27.5 110.76923076923077,27.5 123.07692307692308,27.5 135.3846153846154,27.5 147.6923076923077,30.0 160.0,30.0" transform="translate(20,50)"/>
</g>

<!-- PEAK -->
<g transform="translate(300,70)">
  <rect width="200" height="80" rx="10" class="glass"/>
  <text class="label" x="100" y="20">Peak</text>
  <text class="value" x="100" y="45">19</text>
  <polyline class="spark-alt" points="0.0,30.0 12.307692307692308,30.0 24.615384615384617,0.0 36.92307692307693,30.0 49.23076923076923,10.0 61.53846153846154,20.0 73.84615384615385,20.0 86.15384615384616,30.0 98.46153846153847,23.333333333333336 110.76923076923077,30.0 123.07692307692308,30.0 135.3846153846154,30.0 147.6923076923077,26.666666666666668 160.0,30.0" transform="translate(20,50)"/>
</g>

<!-- MOMENTUM -->
<g transform="translate(560,70)">
  <rect width="200" height="80" rx="10"
        fill="#ff6ec7" fill-opacity="0.15" stroke="#ff6ec7" stroke-opacity="0.3"/>
  <text class="label" x="100" y="20">Momentum</text>
  <text class="value" x="100" y="45">📉 Falling</text>
</g>

<!-- ===== ROW 2 ===== -->
<!-- CONSISTENCY -->
<g transform="translate(160,160)">
  <rect width="200" height="60" rx="10" class="glass"/>
  <text class="label" x="100" y="20">Consistency</text>
  <text class="value" x="100" y="40">93%</text>
  <polyline class="spark" points="0.0,0.0 12.307692307692308,0.0 24.615384615384617,0.0 36.92307692307693,0.0 49.23076923076923,0.0 61.53846153846154,0.0 73.84615384615385,0.0 86.15384615384616,0.0 98.46153846153847,0.0 110.76923076923077,0.0 123.07692307692308,0.0 135.3846153846154,0.0 147.6923076923077,30.0 160.0,30.0" transform="translate(20,45) scale(1,0.6)"/>
</g>

<!-- BEST DAY -->
<g transform="translate(440,160)">
  <rect width="200" height="60" rx="10" class="glass"/>
  <text class="label" x="100" y="20">Best Day</text>
  <text class="value" x="100" y="40">Thu</text>
  <polyline class="spark-alt" points="0.0,11.11111111111111 26.666666666666668,17.77777777777778 53.333333333333336,4.444444444444443 80.0,0.0 106.66666666666667,4.222222222222221 133.33333333333334,13.111111111111114 160.0,8.88888888888889" transform="translate(20,45) scale(1,0.6)"/>
</g>

<!-- SIGNATURE -->
<text x="720" y="40" fill="#9ca3af" opacity="0.8" font-size="12" text-anchor="end">
Built by Sarowar ⚡
</text>

</svg>
